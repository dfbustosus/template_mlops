
name: PR Lint, Typecheck and Test

on:
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    name: Lint, typecheck and unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Poetry and project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          # Install project (including dev) into the runner environment so
          # linters and tests have access to runtime deps like pandas.
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      # - name: Run pre-commit (checks)
      #   run: pre-commit run --all-files

      - name: Run isort (check)
        run: isort --profile black --check --diff .

      - name: Run black (check)
        run: black --check .

      - name: Run flake8
        run: flake8 .

      - name: Run mypy
        run: mypy --ignore-missing-imports src tests || true

      - name: Run pytest
        run: pytest -q

  property-tests:
    name: Property tests (Hypothesis)
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-hypothesis-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-hypothesis-

      - name: Install Poetry and project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Run property-based tests
        run: pytest -q tests/test_property_based.py
